<!doctype html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>التفاصيل</title><link rel="stylesheet" href="styles.css"></head><body><main id="app" class="page"></main><script type="module">
import {bootCommon, injectFrame, seedListings, formatPrice, listingCard} from './common.js'; bootCommon(); injectFrame();
const id=new URLSearchParams(location.search).get('id')||'c1'; const item=seedListings.find(x=>x.id===id)||seedListings[0];
document.getElementById('app').innerHTML=`<div class="container"><div class="page-grid"><aside class="panel"><h3>${item.title}</h3><div class="price">${formatPrice(item.price)}</div><p class="muted">${item.city} • ${item.mileage}</p><div class="card-actions"><a class="btn" target="_blank" href="https://wa.me/218910000000">واتساب</a><a class="ghost-btn" href="tel:+218910000000">اتصال</a></div><table class="table"><tr><th>القسم</th><td>${item.type==='car'?'سيارة':item.type==='part'?'قطعة غيار':'خدمة'}</td></tr><tr><th>الماركة</th><td>${item.brand}</td></tr><tr><th>الموديل</th><td>${item.model}</td></tr><tr><th>السنة</th><td>${item.year}</td></tr></table></aside><section><div class="panel"><div class="listing-image" style="height:420px;background-image:url('${item.imageUrl}')"></div><p class="desc">${item.description}</p></div><div class="section"><div class="section-head"><div><h2>إعلانات مشابهة</h2></div></div><div class="cards">${seedListings.filter(x=>x.id!==item.id).map(listingCard).join('')}</div></div></section></div></div>`;
</script></body></html>
