<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>تفاصيل السيارة | براتشو كار</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="container topbar-inner">
      <a class="brand" href="index.html">
        <div class="brand-badge">BC</div>
        <div><h1>براتشو كار</h1><p>تفاصيل الإعلان</p></div>
      </a>
      <div class="top-actions">
        <a href="index.html" class="outline-btn">الرئيسية</a>
        <a href="dashboard.html" class="outline-btn">حسابي</a>
      </div>
    </div>
  </header>

  <main class="container details-layout">
    <section>
      <div class="gallery">
        <div class="main-photo" id="mainPhoto"></div>
        <div class="thumb-grid" id="thumbGrid"></div>
      </div>
      <div class="detail-card" style="margin-top:18px">
        <h2 id="detailTitle" style="margin-top:0"></h2>
        <div class="price" id="detailPrice"></div>
        <div class="specs" id="specsGrid"></div>
      </div>
      <div class="detail-card" style="margin-top:18px">
        <h3 style="margin-top:0">الوصف</h3>
        <p id="detailDescription" class="hint" style="font-size:1rem;color:#0f172a"></p>
      </div>
    </section>
    <aside class="sticky">
      <div class="detail-card">
        <h3 style="margin-top:0">التواصل مع البائع</h3>
        <div class="spec" style="margin-bottom:10px"><small>المدينة</small><strong id="sellerCity"></strong></div>
        <div class="spec" style="margin-bottom:10px"><small>رقم الهاتف</small><strong id="sellerPhone"></strong></div>
        <a id="whatsappBtn" class="btn" target="_blank" style="width:100%;margin-bottom:10px">واتساب</a>
        <a id="callBtn" class="outline-btn" style="width:100%">اتصال مباشر</a>
      </div>
      <div class="detail-card" style="margin-top:18px">
        <h3 style="margin-top:0">إعلانات مشابهة</h3>
        <div id="relatedList"></div>
      </div>
    </aside>
  </main>

  <div id="toast" class="toast hidden"></div>
  <script type="module" src="details.js"></script>
</body>
</html>
